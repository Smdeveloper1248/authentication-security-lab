<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="login-page">
    <section class="login-panel" aria-labelledby="signup-title">
      <h1 id="signup-title">Sign Up</h1>
      <p class="subtitle">Create an account with your email and password.</p>

      <form id="signup-form" class="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required>

        <button type="submit">Create Account</button>
      </form>

      <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
      <p class="auth-link">Already have an account? <a href="/login.html">Login</a></p>
    </section>
  </main>

  <script src="/signup.js"></script>
</body>
</html>
